services:
  - type: web
    name: dailyhealth-backend-api
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npx prisma db seed && node dist/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dailyhealth-postgres-db
          property: connectionString

databases:
  - name: dailyhealth-postgres-db
    plan: free
